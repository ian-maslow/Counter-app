<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for counter-app">
  <title>counter-app</title>
  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    #demo {
      margin: var(--ddd-spacing-4);
      font-family: sans-serif;
    }
    counter-app {
      display: inline-block;
      margin: var(--ddd-spacing-4);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
      padding: var(--ddd-spacing-4);
    }
    counter-app:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
  </style>
</head>
<body>
  <div id="demo">
    <h1>counter-app Demo</h1>

    <!-- Default: uses built-in defaults (counter=0, min=0, max=100) -->
    <h2>Default</h2>
    <counter-app></counter-app>

    <!-- Configured: starts at 16, locked between 10 and 25 -->
    <h2>Configured</h2>
    <counter-app counter="16" min="10" max="25">
      <div>Configured counter (10–25)</div>
    </counter-app>
  </div>

  <script type="module" src="./counter-app.js"></script>
</body>
</html>
